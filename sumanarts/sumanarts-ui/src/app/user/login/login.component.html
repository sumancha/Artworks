<div class="container">

    <div class="d-flex justify-content-center align-items-center">
    <!-- <a routerLink="/user" routerLinkActive="active">Register</a> -->
   <img class="logo" src="logo.jpg" 
   alt="Logo" />
  </div>
  </div>
<div class="mb-4 ">
  <h2 class="text-success">Log in</h2>
   <div>Don't have an Account?
    <a routerLink="/signup" class="text-decoration-none fw-medium text-sucess d-inline-block">Register</a>
 </div>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="mb-3">
    <input class="form-control bg-body-secondary" placeholder="Email" formControlName="email">
 <div class="error-feedback" *ngIf="hasDisplayableError('email')">
      <div *ngIf="form.controls.email.hasError('required')">
        Please enter your email address.
      </div>
      <div *ngIf="form.controls.email.hasError('email')">
        Please enter a valid email address.
      </div>
    </div>
  </div>

    <div class="mb-3">
    <input class="form-control bg-body-secondary" placeholder="Password" formControlName="password">
 <div class="error-feedback" *ngIf="hasDisplayableError('password') && form.controls.password.hasError('required')">
     
        Please enter your password.
      </div>
  
    
  </div>

  <div class="mt-4">
    <button type="submit" class="btn btn-success w-100 rounded-3">
      Login
    </button>
  </div>
  </form>
